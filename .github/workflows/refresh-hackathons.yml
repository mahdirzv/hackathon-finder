name: Refresh Hackathons

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC daily
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # Give the daemon a moment to start
          sleep 3

      - name: Pull cloud model
        run: ollama pull gemma4:31b-cloud
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Run hackathon refresh agent
        run: python3 scripts/refresh-hackathons.py
        env:
          OLLAMA_BASE_URL: "http://localhost:11434"
          OLLAMA_API_KEY:  ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL:    "gemma4:31b-cloud"

      - name: Commit changes if any
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add src/data/hackathons.json src/data/.hackathon-fetch-state.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily hackathon refresh $(date +%Y-%m-%d) [skip ci]"

      - name: Push
        run: git push
